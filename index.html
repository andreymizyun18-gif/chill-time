<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <base target="_blank">
  </head>
  <body>
    <div class="stars" id="stars"></div>
    <section class="hero">
      <div class="logo">Chill Time</div>
      <div class="tagline">Место, где можно просто быть</div>
    </section>
    <div class="section-title">Наши</div>
    <div class="team-grid" id="teamGrid"></div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <img class="modal-avatar" id="modalAvatar" src="" alt="" />
        <div class="modal-name" id="modalName"></div>
        <div class="modal-bio" id="modalBio"></div>
        <div class="modal-tags" id="modalTags"></div>
        <button class="modal-close" onclick="closeModal()">Закрыть</button>
      </div>
    </div>
    <footer class="footer">
      Сделано с <span class="footer-heart">♥</span> для Chill Time
    </footer>
    <script src="scripts/main.js"></script>
  </body>
</html>
